<div id="ipnrm-ui-modal-{{ modalData.id }}" class="ipnrm-ui-modal" tabindex="-1">
	<div class="ipnrm-ui-modal-dialog">
		<div class="ipnrm-ui-modal-header">
			<div class="ipnrm-ui-modal-close" x-ng-click="modalData.deferred.resolve('close');">&times;</div>
			<div class="ipnrm-ui-modal-title">Select Images</div>
		</div>
		<div class="ipnrm-ui-modal-data">
			<div class="ipnrm-ui-modal-info">
				Before select, you should upload images to 'upload' folder via FTP
			</div>
			<div ng-if="modalData.selectedFile">
				<img width="100%" ng-src="{{ modalData.selectedFile.filename }}" alt="Image Preview" class="image-preview" />
				<script>
					const selectUploadedFile = document.querySelector(".select-uploaded-file");
					
					selectUploadedFile.addEventListener("change", function(){
						const imagePreview = document.querySelector(".image-preview");

						const sourceImage = imagePreview.getAttribute("src")
						const panoramaId = sourceImage.split("-")[1];
						const userId = sourceImage.split("-")[2];
				
						const imageUrlMerged = `/uploads/ipanoramaBuilder/upload/${userId}/${panoramaId}/${sourceImage}`;
						imagePreview.setAttribute("src", imageUrlMerged);

						// console.log(imageUrlMerged);
					});
				</script>
			</div>
			<select style="margin: 10px 0;">
				<option value="">Sort by</option>
				<option value="">By name</option>
				<option value="">Latest uploaded</option>
				<option value="">Oldest uploaded</option>
			</select>
			<select class="ipnrm-ui-modal-long select-uploaded-file" size="10" x-ng-dblclick="modalData.fn.selectFile(modalData)" x-ng-options="file as file.filename for file in modalData.files" x-ng-model="modalData.selectedFile">
				<option style="display:none" value=""></option>
			</select>
		</div>
		<div class="ipnrm-ui-modal-footer">
			<div class="ipnrm-ui-modal-btn ipnrm-ui-modal-btn-close" x-ng-click="modalData.deferred.resolve('close');">Close</div>
			<div class="ipnrm-ui-modal-btn ipnrm-ui-modal-btn-select" x-ng-click="modalData.fn.selectFile(modalData);">Select</div>
		</div>
	</div>
</div>
